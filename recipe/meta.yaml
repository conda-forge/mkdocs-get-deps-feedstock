{% set name = "mkdocs-get-deps" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mkdocs_get_deps-{{ version }}.tar.gz
  sha256: 177f9629f71716a8250b417f41b0a2d2145a9fd986d84d0d723b2e3406ce3741

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - mkdocs-get-deps = mkdocs_get_deps.__main__:cli


requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - importlib-metadata >=4.3
    - mergedeep >=1.3.4
    - platformdirs >=2.2.0
    - pyyaml >=5.1

test:
  imports:
    - mkdocs_get_deps
  commands:
    - pip check
    - mkdocs-get-deps --help
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: MkDocs extension that lists all dependencies according to a mkdocs.yml file
  home: https://github.com/mkdocs/get-deps
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - dhirschfeld
